name: Deploy PCI DSS v4.0.1 Readiness to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-pci-dss
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: github/pci-dss/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: github/pci-dss

      - name: Build
        run: npx astro build
        working-directory: github/pci-dss

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: github/pci-dss/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
